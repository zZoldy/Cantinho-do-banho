<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Cantinho do Banho</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="admin.css"/>
</head>
<body class="login-page">

<div class="login-wrapper">
  <div class="login-box">
    <div class="login-logo">
      <i class="fas fa-paw"></i>
    </div>
    <h1>Cantinho do Banho</h1>
    <p class="login-sub">Acesso ao Sistema Interno</p>

    <form id="loginForm">
      <div class="input-field">
        <i class="fas fa-user"></i>
        <input type="text" id="usuario" placeholder="Usuário" required autocomplete="username"/>
      </div>
      <div class="input-field">
        <i class="fas fa-lock"></i>
        <input type="password" id="senha" placeholder="Senha" required autocomplete="current-password"/>
      </div>
      <div id="erro-login" class="erro-msg" style="display:none">
        <i class="fas fa-exclamation-circle"></i> Usuário ou senha incorretos.
      </div>
      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt"></i> Entrar
      </button>
    </form>

    <p class="login-footer">© 2025 Cantinho do Banho</p>
  </div>
</div>

<script>
  // Usuários padrão — altere como quiser
  const USUARIOS = [
    { usuario: 'admin', senha: '1234', nome: 'Administrador', cargo: 'admin' },
    { usuario: 'anapaula', senha: '1234', nome: 'Ana Paula', cargo: 'funcionario' },
    { usuario: 'hegly', senha: '1234', nome: 'Hegly', cargo: 'funcionario' },
  ];

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const u = document.getElementById('usuario').value.trim();
    const s = document.getElementById('senha').value;
    const encontrado = USUARIOS.find(x => x.usuario === u && x.senha === s);
    if (encontrado) {
      localStorage.setItem('cb_logado', JSON.stringify(encontrado));
      window.location.href = 'admin-dashboard.html';
    } else {
      document.getElementById('erro-login').style.display = 'flex';
    }
  });

  // Limpa sessão ao abrir o login
  localStorage.removeItem('cb_logado');
</script>
</body>
</html>
